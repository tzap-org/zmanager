name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  package:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            triplet: x64-windows-static-md
            vcarch: x64
            component: Microsoft.VisualStudio.Component.VC.Tools.x86.x64
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            triplet: arm64-windows-static-md
            vcarch: arm64
            component: Microsoft.VisualStudio.Component.VC.Tools.ARM64

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake libb2 lz4 xz zstd

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libacl1-dev \
            libbz2-dev \
            liblz4-dev \
            liblzma-dev \
            libssl-dev \
            libxml2-dev \
            libzstd-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Package Unix
        if: runner.os != 'Windows'
        run: scripts/package-release.sh "${{ matrix.target }}" dist

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          powershell -ExecutionPolicy Bypass -File scripts/ci-windows.ps1
          -Target "${{ matrix.target }}"
          -Triplet "${{ matrix.triplet }}"
          -VcArch "${{ matrix.vcarch }}"
          -VsComponent "${{ matrix.component }}"
          -Package
          -OutDir dist

      - uses: actions/upload-artifact@v6
        with:
          name: zm-${{ matrix.target }}
          path: dist/zm-${{ matrix.target }}.*

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: package

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Prepare checksums
        run: |
          cd release-artifacts
          sha256sum *.tar.gz *.zip > SHA256SUMS

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            release-artifacts/*.tar.gz \
            release-artifacts/*.zip \
            release-artifacts/SHA256SUMS \
            --verify-tag \
            --title "$TAG_NAME" \
            --notes "Z-Manager CLI $TAG_NAME"
