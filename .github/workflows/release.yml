name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.1.0"
        required: true

permissions:
  contents: write

env:
  MACOSX_DEPLOYMENT_TARGET: "11.0"

jobs:
  package:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-musl
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            triplet: x64-windows-static
            vcarch: x64
            component: Microsoft.VisualStudio.Component.VC.Tools.x86.x64
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            triplet: arm64-windows-static
            vcarch: arm64
            component: Microsoft.VisualStudio.Component.VC.Tools.ARM64

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake libb2 lz4 xz zstd

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            cmake \
            file \
            musl-tools \
            xz-utils \
            python3 \
            build-essential
          sudo scripts/install-zig-linux.sh /opt/zig
          echo /opt/zig >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - uses: actions/setup-python@v6
        if: runner.os == 'Windows'
        with:
          python-version: "3.x"

      - name: Package Unix
        if: runner.os != 'Windows'
        run: scripts/package-release.sh "${{ matrix.target }}" dist

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          powershell -ExecutionPolicy Bypass -File scripts/ci-windows.ps1
          -Target "${{ matrix.target }}"
          -Triplet "${{ matrix.triplet }}"
          -VcArch "${{ matrix.vcarch }}"
          -VsComponent "${{ matrix.component }}"
          -Package
          -OutDir dist

      - uses: actions/upload-artifact@v6
        with:
          name: zm-${{ matrix.target }}
          path: dist/zm-${{ matrix.target }}.*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-22.04
    needs: package

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Prepare checksums
        run: |
          cd release-artifacts
          sha256sum *.tar.gz *.zip *.deps.txt > SHA256SUMS

      - name: Prepare package metadata
        env:
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          scripts/generate-package-metadata.sh \
            "$TAG_NAME" \
            "https://github.com/tzap-org/zmanager/releases/download/$TAG_NAME" \
            release-artifacts/SHA256SUMS \
            release-artifacts/package-metadata
          tar -C release-artifacts/package-metadata -czf release-artifacts/package-metadata.tar.gz .
          (
            cd release-artifacts
            sha256sum package-metadata.tar.gz >> SHA256SUMS
          )

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          NOTES_FILE="docs/release-notes/${TAG_NAME#v}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "release notes file not found: $NOTES_FILE" >&2
            exit 1
          fi
          gh release create "$TAG_NAME" \
            release-artifacts/*.tar.gz \
            release-artifacts/*.zip \
            release-artifacts/*.deps.txt \
            release-artifacts/SHA256SUMS \
            --verify-tag \
            --title "$TAG_NAME" \
            --notes-file "$NOTES_FILE"
