name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  package:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-2025
            target: x86_64-pc-windows-gnu

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: msys2/setup-msys2@v2
        if: runner.os == 'Windows'
        with:
          msystem: MINGW64
          path-type: inherit
          update: true
          install: >-
            mingw-w64-x86_64-bzip2
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-lz4
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-xz
            mingw-w64-x86_64-zip
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-zstd

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake libb2 lz4 xz zstd

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libacl1-dev \
            libbz2-dev \
            liblz4-dev \
            liblzma-dev \
            libssl-dev \
            libxml2-dev \
            libzstd-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Package Unix
        if: runner.os != 'Windows'
        run: scripts/package-release.sh "${{ matrix.target }}" dist

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
          CMAKE_GENERATOR: Ninja
          PKG_CONFIG_ALL_STATIC: "1"
          RUSTFLAGS: -C target-feature=+crt-static -C link-arg=-static -C link-arg=-static-libgcc -C link-arg=-static-libstdc++
        run: |
          unset CMAKE_TOOLCHAIN_FILE
          unset VCPKG_DEFAULT_TRIPLET
          unset VCPKG_INSTALLATION_ROOT
          unset VCPKG_ROOT
          unset VCPKG_TARGET_TRIPLET

          mingw_prefix="$(cygpath -m "$MINGW_PREFIX")"
          export CMAKE_PREFIX_PATH="$mingw_prefix"
          export LIBCLANG_PATH="$mingw_prefix/bin"
          export PKG_CONFIG_PATH="$MINGW_PREFIX/lib/pkgconfig"

          echo "MINGW_PREFIX=$MINGW_PREFIX"
          echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH"
          echo "LIBCLANG_PATH=$LIBCLANG_PATH"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"

          scripts/package-release.sh "${{ matrix.target }}" dist
          objdump -p target/x86_64-pc-windows-gnu/release/zm.exe | tee windows-dlls.txt
          if grep -Ei 'DLL Name: (libgcc|libstdc\+\+|libwinpthread|zlib|bz2|libbz2|liblzma|zstd|libzstd|lz4|liblz4|libcrypto|libssl)' windows-dlls.txt; then
            echo "Windows GNU release still depends on third-party DLLs" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v6
        with:
          name: zm-${{ matrix.target }}
          path: dist/zm-${{ matrix.target }}.*

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: package

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Prepare checksums
        run: |
          cd release-artifacts
          sha256sum *.tar.gz *.zip > SHA256SUMS

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            release-artifacts/*.tar.gz \
            release-artifacts/*.zip \
            release-artifacts/SHA256SUMS \
            --verify-tag \
            --title "$TAG_NAME" \
            --notes "Z-Manager CLI $TAG_NAME"
