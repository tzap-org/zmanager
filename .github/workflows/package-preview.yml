name: Package Preview

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/package-preview.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "packaging/**"
      - "scripts/**"

permissions:
  contents: read

env:
  MACOSX_DEPLOYMENT_TARGET: "11.0"

concurrency:
  group: package-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-musl
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            triplet: x64-windows-static
            vcarch: x64
            component: Microsoft.VisualStudio.Component.VC.Tools.x86.x64
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            triplet: arm64-windows-static
            vcarch: arm64
            component: Microsoft.VisualStudio.Component.VC.Tools.ARM64

    steps:
      - uses: actions/checkout@v6

      - name: Clone tzap
        shell: bash
        run: |
          TZAP_REV=$(cat tzap-rev.txt)
          git clone https://github.com/tzap-org/tzap.git ../tzap
          git -C ../tzap checkout "$TZAP_REV"

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake libb2 lz4 xz zstd

      - name: Install Linux dependencies
        if: runner.os == 'Linux' && matrix.target != 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            cmake \
            file \
            musl-tools \
            xz-utils \
            python3 \
            build-essential
          sudo scripts/install-zig-linux.sh /opt/zig
          echo /opt/zig >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - uses: actions/setup-python@v6
        if: runner.os == 'Windows'
        with:
          python-version: "3.x"

      - name: Package Unix
        if: runner.os != 'Windows' && matrix.target != 'aarch64-unknown-linux-musl'
        run: scripts/package-release.sh "${{ matrix.target }}" dist

      - name: Package Linux ARM64 musl in Alpine
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: scripts/package-release-alpine.sh "${{ matrix.target }}" dist

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          powershell -ExecutionPolicy Bypass -File scripts/ci-windows.ps1
          -Target "${{ matrix.target }}"
          -Triplet "${{ matrix.triplet }}"
          -VcArch "${{ matrix.vcarch }}"
          -VsComponent "${{ matrix.component }}"
          -Package
          -OutDir dist

      - name: Summarize preview artifacts
        shell: bash
        run: |
          {
            echo "### Package preview"
            echo
            echo "Download this run's artifacts from the GitHub Actions run page."
            echo "Linux tarballs are static single-binary artifacts."
            echo
            echo '```text'
            ls -1 dist
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v6
        with:
          name: zm-preview-${{ matrix.target }}
          path: dist/zm-${{ matrix.target }}.*
          if-no-files-found: error
          retention-days: 14
