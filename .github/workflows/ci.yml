name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
          - name: macOS Intel
            os: macos-15-intel
          - name: Linux x86_64
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake libb2 lz4 xz zstd

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libacl1-dev \
            libbz2-dev \
            liblz4-dev \
            liblzma-dev \
            libssl-dev \
            libxml2-dev \
            libzstd-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Test
        run: cargo test --workspace
