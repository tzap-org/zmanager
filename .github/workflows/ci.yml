name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
          - name: macOS Intel
            os: macos-15-intel
          - name: Linux x86_64
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake libb2 lz4 xz zstd

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            brotli \
            bzip2 \
            cmake \
            gcab \
            genisoimage \
            gzip \
            libacl1-dev \
            libarchive-dev \
            libarchive-tools \
            libbz2-dev \
            liblz4-dev \
            liblzma-dev \
            libssl-dev \
            libxml2-dev \
            libzstd-dev \
            lrzip \
            lz4 \
            lzip \
            lzop \
            ncompress \
            rpm \
            unzip \
            xz-utils \
            zip \
            zstd
          sudo apt-get install -y 7zip || sudo apt-get install -y p7zip-full

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Test
        shell: bash
        run: |
          set +e
          set -o pipefail
          cargo test --workspace 2>&1 | tee cargo-test.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -ne 0 ]; then
            {
              echo "### cargo test failed"
              echo
              echo '```text'
              tail -n 80 cargo-test.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            message="$(tail -n 40 cargo-test.log)"
            message="${message//'%'/'%25'}"
            message="${message//$'\r'/'%0D'}"
            message="${message//$'\n'/'%0A'}"
            echo "::error title=cargo test failed::$message"
            exit "$status"
          fi

  windows-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-2025
            target: x86_64-pc-windows-msvc
            triplet: x64-windows
            vc_arch: x64
            vs_component: Microsoft.VisualStudio.Component.VC.Tools.x86.x64
          - name: Windows ARM64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            triplet: arm64-windows
            vc_arch: arm64
            vs_component: Microsoft.VisualStudio.Component.VC.Tools.ARM64

    steps:
      - uses: actions/checkout@v6

      - name: Test
        shell: pwsh
        run: >
          scripts/ci-windows.ps1
          -Target "${{ matrix.target }}"
          -Triplet "${{ matrix.triplet }}"
          -VcArch "${{ matrix.vc_arch }}"
          -VsComponent "${{ matrix.vs_component }}"
