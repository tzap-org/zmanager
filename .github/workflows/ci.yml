name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
          - name: macOS Intel
            os: macos-15-intel
          - name: Linux x86_64
            os: ubuntu-latest
          - name: Linux ARM64
            os: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake libb2 lz4 xz zstd

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            brotli \
            bzip2 \
            cmake \
            gcab \
            genisoimage \
            gzip \
            libacl1-dev \
            libarchive-dev \
            libarchive-tools \
            libbz2-dev \
            liblz4-dev \
            liblzma-dev \
            libssl-dev \
            libxml2-dev \
            libzstd-dev \
            lrzip \
            lz4 \
            lzip \
            lzop \
            ncompress \
            rpm \
            unzip \
            xz-utils \
            zip \
            zstd
          sudo apt-get install -y 7zip || sudo apt-get install -y p7zip-full

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Test
        shell: bash
        run: |
          set +e
          set -o pipefail
          cargo test --workspace 2>&1 | tee cargo-test.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -ne 0 ]; then
            {
              echo "### cargo test failed"
              echo
              echo '```text'
              tail -n 80 cargo-test.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            message="$(tail -n 40 cargo-test.log)"
            message="${message//'%'/'%25'}"
            message="${message//$'\r'/'%0D'}"
            message="${message//$'\n'/'%0A'}"
            echo "::error title=cargo test failed::$message"
            exit "$status"
          fi

  windows-test:
    name: Windows x64 GNU
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v6

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          update: true
          install: >-
            mingw-w64-x86_64-bzip2
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-lz4
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-xz
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-zstd

      - name: Install Rust target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Test
        shell: msys2 {0}
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
          CMAKE_GENERATOR: Ninja
          CMAKE_PREFIX_PATH: C:/msys64/mingw64
          LIBCLANG_PATH: C:/msys64/mingw64/bin
          PKG_CONFIG_ALL_STATIC: "1"
          PKG_CONFIG_PATH: C:/msys64/mingw64/lib/pkgconfig
          RUSTFLAGS: -C target-feature=+crt-static -C link-arg=-static -C link-arg=-static-libgcc -C link-arg=-static-libstdc++
        run: |
          cargo test --workspace --target x86_64-pc-windows-gnu
          cargo build --release --target x86_64-pc-windows-gnu -p zmanager-cli --bin zm
          objdump -p target/x86_64-pc-windows-gnu/release/zm.exe | tee windows-dlls.txt
          if grep -Ei 'DLL Name: (libgcc|libstdc\+\+|libwinpthread|zlib|bz2|libbz2|liblzma|zstd|libzstd|lz4|liblz4|libcrypto|libssl)' windows-dlls.txt; then
            echo "Windows GNU build still depends on third-party DLLs" >&2
            exit 1
          fi
